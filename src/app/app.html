<div class="main">
  <h3>Gustavo Pereira da Silva Felippe - 256429</h3>
  <h3>Giovanna Rodrigues Alves - 252729
  <h3>Giovanna Teodozio dos Santos - 256417</h3>
  <input class="lg-text-input" #campoNovoItem (keyup.enter)="CREATE_tarefa(campoNovoItem.value); campoNovoItem.value=''" />
  <button class="btn-primary" (click)="CREATE_tarefa(campoNovoItem.value); campoNovoItem.value=''">
    Adicionar Tarefa
  </button>
  <ul>
    <li *ngFor="let tarefaDoLoop of arrayDeTarefas">
      <app-item
        [tarefa]="tarefaDoLoop"
        (removeTarefa)="DELETE_tarefa(tarefaDoLoop)"
        (atualizaTarefa)="UPDATE_tarefa($event)">
      </app-item>
    </li>
  </ul>
</div>
